name: Release On Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Prepare release metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="snapshot-v${VERSION}-${SHORT_SHA}"
          ASSET="catawiki-price-calculator-v${VERSION}-${SHORT_SHA}.zip"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: |
          cd dist
          zip -r "../${{ steps.meta.outputs.asset }}" .

      - name: Publish prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: Main snapshot v${{ steps.meta.outputs.version }} (${{ steps.meta.outputs.short_sha }})
          prerelease: true
          generate_release_notes: true
          files: ${{ steps.meta.outputs.asset }}
