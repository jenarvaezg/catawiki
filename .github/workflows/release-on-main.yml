name: Release On Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6.0.1

      - name: Set up Node.js
        uses: actions/setup-node@v6.1.0
        with:
          node-version: 24
          check-latest: true
          cache: npm

      - name: Print tool versions
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run tests
        run: npm test

      - name: Build extension
        run: npm run build

      - name: Prepare release metadata
        id: meta
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=$(git rev-parse --short HEAD)
          TAG="snapshot-v${VERSION}-${SHORT_SHA}"
          ASSET="catawiki-price-calculator-v${VERSION}-${SHORT_SHA}.zip"

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "asset=${ASSET}" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: |
          cd dist
          zip -r "../${{ steps.meta.outputs.asset }}" .

      - name: Publish prerelease
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.meta.outputs.tag }}" \
            "${{ steps.meta.outputs.asset }}" \
            --title "Main snapshot v${{ steps.meta.outputs.version }} (${{ steps.meta.outputs.short_sha }})" \
            --generate-notes \
            --prerelease
